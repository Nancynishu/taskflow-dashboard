<!DOCTYPE html>
<html>

<head>

<title>
TaskFlow Login
</title>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'Poppins',
sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#1e293b,
#0f172a
);
overflow:hidden;
}

/* CARD */

.box{
width:420px;
background:
rgba(
255,255,255,
0.08
);
backdrop-filter:
blur(14px);
padding:35px;
border-radius:24px;
text-align:center;
box-shadow:
0 10px 30px
rgba(
0,0,0,0.3
);
color:white;
animation:
fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:
translateY(20px);
}

to{
opacity:1;
transform:
translateY(0);
}
}

.logo{
font-size:34px;
font-weight:700;
margin-bottom:10px;
color:#38bdf8;
}

.subtitle{
opacity:0.8;
margin-bottom:25px;
font-size:14px;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:14px;
font-size:15px;
background:
rgba(
255,255,255,
0.1
);
color:white;
}

input::placeholder{
color:#cbd5e1;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:
linear-gradient(
90deg,
#2563eb,
#3b82f6
);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:
scale(1.02);
}

/* SWITCH */

.link{
margin-top:18px;
color:#38bdf8;
cursor:pointer;
font-size:14px;
}

/* TOAST */

#toast{
position:fixed;
top:50%;
left:50%;
transform:
translate(
-50%,
-50%
);
background:#22c55e;
color:white;
padding:18px 28px;
border-radius:14px;
display:none;
z-index:9999;
font-size:18px;
font-weight:600;
box-shadow:
0 10px 30px
rgba(
0,0,0,0.2
);
}

</style>

</head>

<body>

<div id="toast"></div>

<div class="box">

<div class="logo">
TaskFlow
</div>

<p class="subtitle">
Manage your tasks smarter & stay productive
</p>

<h2 id="title">
Login
</h2>

<!-- NAME FIELDS -->

<input
id="firstName"
placeholder="First Name">

<input
id="lastName"
placeholder="Last Name">

<!-- COMMON -->

<input
id="email"
placeholder="Enter Email">

<input
id="password"
type="password"
placeholder="Enter Password">

<button
onclick="submitForm()">

Submit

</button>

<p
onclick="toggle()"
class="link">

Switch to Register

</p>

</div>

<script>

let isLogin =
true;

/* TOGGLE */

function toggle(){

isLogin =
!isLogin;

document
.getElementById(
"title"
)
.innerText =
isLogin
? "Login"
: "Register";

document
.querySelector(
".link"
)
.innerText =
isLogin
? "Switch to Register"
: "Switch to Login";

}

/* TOAST */

function showToast(
msg,
color="#22c55e"
){

let toast =
document
.getElementById(
"toast"
);

toast.innerText =
msg;

toast.style.background =
color;

toast.style.display =
"block";

setTimeout(()=>{

toast.style.display =
"none";

},2000);

}

/* SUBMIT */

async function submitForm(){

let firstName =
document
.getElementById(
"firstName"
).value.trim();

let lastName =
document
.getElementById(
"lastName"
).value.trim();

let email =
document
.getElementById(
"email"
).value.trim();

let password =
document
.getElementById(
"password"
).value.trim();


if(
!firstName ||
!lastName ||
!email ||
!password
){
showToast(
"Please fill all fields",
"#ef4444"
);
return;
}

let url =
isLogin
? "/login"
: "/register";

let bodyData = {

firstName:
firstName,

lastName:
lastName,

email:
email,

password:
password

};

let res =
await fetch(
url,
{
method:
"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
bodyData
)
}
);

let data =
await res.json();

/* LOGIN */

if(
isLogin &&
res.status === 200
){

showToast(
`${data.greeting}, ${data.firstName} 👋`
);

setTimeout(()=>{

window.location.href =
"/dashboard";

},1500);

}

/* REGISTER */

else if(
!isLogin &&
res.status === 200
){

showToast(
"Registration Successful ✅"
);

setTimeout(()=>{

toggle();

},1500);

}

else{

showToast(
data.message,
"#ef4444"
);

}

}

</script>

</body>
</html>
